name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install numpy pytest
      - run: python -c "from graph.graph_store import PropertyGraph, Node, Edge; g=PropertyGraph(); g.add_node(Node('Alice','PERSON')); g.add_edge(Edge('Alice','WORKS_AT','Microsoft')); print(f'graph OK: {g.stats}')"
      - run: python run.py
